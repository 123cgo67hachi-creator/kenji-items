name: Sync Catalog from Notion

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: '商品名（admin経由の場合）'
        required: false
      rakuten_url:
        description: '楽天リンク（admin経由の場合）'
        required: false
      image_filename:
        description: '画像ファイル名（admin経由の場合）'
        required: false
  schedule:
    - cron: '30 20 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update Notion if admin input provided
        if: inputs.product_name != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PRODUCT_NAME: ${{ inputs.product_name }}
          RAKUTEN_URL: ${{ inputs.rakuten_url }}
          IMAGE_FILENAME: ${{ inputs.image_filename }}
        run: python3 update_notion.py

      - name: Generate catalog from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 generate.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "Sync catalog from Notion" && git push)
