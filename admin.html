<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カタログ管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: white;
  padding: 1.5rem 1rem;
  text-align: center;
}
.header h1 { font-size: 1.2rem; }
.container { max-width: 500px; margin: 0 auto; padding: 1rem; }

.setup-card, .form-card {
  background: white;
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: #666;
  margin-bottom: 0.3rem;
  margin-top: 1rem;
}
label:first-child { margin-top: 0; }

input[type="text"], input[type="url"], select {
  width: 100%;
  padding: 0.7rem;
  border: 1.5px solid #e5e5ea;
  border-radius: 10px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: #0f3460; }

.dropzone {
  border: 2px dashed #ccc;
  border-radius: 12px;
  padding: 2rem 1rem;
  text-align: center;
  color: #999;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-top: 0.3rem;
}
.dropzone.dragover { border-color: #0f3460; background: #f0f4ff; }
.dropzone.has-file { border-color: #34c759; background: #f0fff4; color: #333; }
.dropzone img { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 0.5rem; }

.btn {
  width: 100%;
  padding: 0.85rem;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 1.5rem;
  transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: #0f3460; color: white; }
.btn-save { background: #34c759; color: white; }
.btn:disabled { background: #ccc; cursor: not-allowed; }

.status {
  text-align: center;
  padding: 1rem;
  font-size: 0.85rem;
  border-radius: 10px;
  margin-top: 1rem;
  display: none;
}
.status.success { display: block; background: #d4edda; color: #155724; }
.status.error { display: block; background: #f8d7da; color: #721c24; }
.status.loading { display: block; background: #fff3cd; color: #856404; }

.token-hint {
  font-size: 0.7rem;
  color: #999;
  margin-top: 0.3rem;
  line-height: 1.4;
}

.sync-only {
  text-align: center;
  margin-top: 0.5rem;
}
.sync-only a {
  color: #0f3460;
  font-size: 0.8rem;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="header">
  <h1>カタログ管理</h1>
</div>

<div class="container">
  <!-- Token Setup (初回のみ) -->
  <div class="setup-card" id="setupCard" style="display:none;">
    <label>GitHub Token</label>
    <input type="text" id="tokenInput" placeholder="ghp_xxxx または gho_xxxx">
    <p class="token-hint">
      GitHub CLIで <code>gh auth token</code> を実行して取得できます。<br>
      一度保存すれば次回から不要です。
    </p>
    <button class="btn btn-save" onclick="saveToken()">保存</button>
  </div>

  <!-- Main Form -->
  <div class="form-card" id="mainForm" style="display:none;">
    <label>商品名</label>
    <select id="productSelect">
      <option value="">選択してください</option>
    </select>

    <label>楽天アフィリエイトURL</label>
    <input type="url" id="rakutenUrl" placeholder="https://a.r10.to/xxxxx">

    <label>サムネイル画像</label>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      タップして画像を選択<br>またはドラッグ＆ドロップ
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <button class="btn btn-primary" id="submitBtn" onclick="submit()">送信</button>

    <div class="sync-only">
      <a href="#" onclick="syncOnly(); return false;">画像なしで同期だけ実行</a>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
const REPO = '123cgo67hachi-creator/kenji-items';
const REPO_API = `https://api.github.com/repos/${REPO}`;

let selectedFile = null;

// Token management
function getToken() { return localStorage.getItem('gh_token'); }
function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  localStorage.setItem('gh_token', t);
  init();
}

function authHeaders() {
  return {
    'Authorization': `Bearer ${getToken()}`,
    'Accept': 'application/vnd.github.v3+json'
  };
}

// Init
async function init() {
  const token = getToken();
  if (!token) {
    document.getElementById('setupCard').style.display = 'block';
    document.getElementById('mainForm').style.display = 'none';
    return;
  }
  document.getElementById('setupCard').style.display = 'none';
  document.getElementById('mainForm').style.display = 'block';
  await loadProducts();
}

// Load product list from current index.html's embedded JSON
async function loadProducts() {
  try {
    const resp = await fetch('index.html');
    const html = await resp.text();
    const match = html.match(/const products = (\[.*?\]);/s);
    if (match) {
      const products = JSON.parse(match[1]);
      const sel = document.getElementById('productSelect');
      sel.innerHTML = '<option value="">選択してください</option>' +
        '<option value="__new__">＋ 新しい商品を追加</option>' +
        products.map(p =>
          `<option value="${p.name}" data-url="${p.rakuten_url}">${p.name}${p.rakuten_url ? ' ✓' : ''}</option>`
        ).join('');
    }
  } catch (e) {
    console.error('Failed to load products:', e);
  }
}

// Product selection
document.getElementById('productSelect').addEventListener('change', function() {
  if (this.value === '__new__') {
    const name = prompt('商品名を入力:');
    if (name) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      opt.selected = true;
      this.insertBefore(opt, this.lastElementChild);
    } else {
      this.value = '';
    }
  }
  const selected = this.selectedOptions[0];
  if (selected && selected.dataset.url) {
    document.getElementById('rakutenUrl').value = selected.dataset.url;
  }
});

// Drag & drop
const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', () => { if (fi.files[0]) handleFile(fi.files[0]); });

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  selectedFile = file;
  dz.classList.add('has-file');
  dz.innerHTML = `<strong>${file.name}</strong> (${(file.size/1024).toFixed(0)}KB)`;
  const img = document.createElement('img');
  img.src = URL.createObjectURL(file);
  dz.appendChild(img);
}

// Show status
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

// Upload image to repo
async function uploadImage(name, file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const safeName = name.replace(/[^a-zA-Z0-9　-鿿豈-﫿]/g, '_');
  const filename = `${safeName}.${ext}`;
  const path = `images/${filename}`;

  const buf = await file.arrayBuffer();
  const base64 = btoa(new Uint8Array(buf).reduce((s, b) => s + String.fromCharCode(b), ''));

  let sha = null;
  try {
    const existing = await fetch(`${REPO_API}/contents/${path}`, { headers: authHeaders() });
    if (existing.ok) {
      const data = await existing.json();
      sha = data.sha;
    }
  } catch (e) {}

  const body = {
    message: `Add image: ${filename}`,
    content: base64,
  };
  if (sha) body.sha = sha;

  const resp = await fetch(`${REPO_API}/contents/${path}`, {
    method: 'PUT',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) throw new Error(`Image upload failed: ${resp.status}`);
  return filename;
}

// Trigger sync workflow
async function triggerSync(productName, rakutenUrl, imageFilename) {
  const body = {
    ref: 'main',
    inputs: {
      product_name: productName || '',
      rakuten_url: rakutenUrl || '',
      image_filename: imageFilename || ''
    }
  };
  const resp = await fetch(`${REPO_API}/actions/workflows/sync.yml/dispatches`, {
    method: 'POST',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok && resp.status !== 204) throw new Error(`Sync trigger failed: ${resp.status}`);
}

// Submit
async function submit() {
  const name = document.getElementById('productSelect').value;
  const url = document.getElementById('rakutenUrl').value.trim();

  if (!name) { showStatus('商品を選択してください', 'error'); return; }
  if (!url && !selectedFile) { showStatus('URLか画像を入力してください', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('送信中...', 'loading');

  try {
    let imageFilename = '';
    if (selectedFile) {
      showStatus('画像アップロード中...', 'loading');
      imageFilename = await uploadImage(name, selectedFile);
    }

    showStatus('同期トリガー中...', 'loading');
    await triggerSync(name, url, imageFilename);

    showStatus('送信完了！ 1〜2分でカタログに反映されます。', 'success');
    selectedFile = null;
    dz.classList.remove('has-file');
    dz.innerHTML = 'タップして画像を選択<br>またはドラッグ＆ドロップ';
    document.getElementById('rakutenUrl').value = '';
    document.getElementById('productSelect').value = '';

  } catch (e) {
    showStatus('エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// Sync only (no image/url update)
async function syncOnly() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('同期トリガー中...', 'loading');
  try {
    await triggerSync('', '', '');
    showStatus('同期開始！ 1〜2分でカタログに反映されます。', 'success');
  } catch (e) {
    showStatus('エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
